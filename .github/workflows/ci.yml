name: ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run docs validator
        run: python scripts/validate_docs.py
      - name: Verify OpenAPI sync against control-plane full contract
        if: ${{ secrets.AXME_CONTROL_PLANE_READ_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.AXME_CONTROL_PLANE_READ_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AxmeAI/axme-control-plane" ../axme-control-plane
          python -m pip install -r ../axme-control-plane/requirements.txt
          python ../axme-control-plane/scripts/export_gateway_openapi.py
          diff -u docs/openapi/gateway.v1.json ../axme-control-plane/docs/openapi/gateway.v1.json
          diff -u docs/openapi/gateway.track-f-sprint1.v1.json ../axme-control-plane/docs/openapi/gateway.track-f-sprint1.v1.json
      - name: OpenAPI sync gate skipped (missing cross-repo token)
        if: ${{ secrets.AXME_CONTROL_PLANE_READ_TOKEN == '' }}
        run: |
          echo "::warning::AXME_CONTROL_PLANE_READ_TOKEN is not configured; skipping control-plane OpenAPI sync gate."
      - name: Run tests
        run: python -m pytest -q
